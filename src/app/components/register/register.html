<div class="auth-wrapper">

  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-subtitle">Rejoignez l'espace RH ASM</p>
    </div>

    <!-- NOM + PRENOM -->
    <div class="auth-row">
      <div class="auth-field">
        <label class="auth-label">Nom</label>
        <div class="auth-input-wrapper" [class.has-error]="errors.nom">
          <input type="text" [(ngModel)]="regData.nom"
                 placeholder="Ben Ali" class="auth-input"
                 (input)="errors.nom = ''" />
        </div>
        <div class="auth-error" *ngIf="errors.nom">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errors.nom }}
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-label">Prénom</label>
        <div class="auth-input-wrapper" [class.has-error]="errors.prenom">
          <input type="text" [(ngModel)]="regData.prenom"
                 placeholder="Ahmed" class="auth-input"
                 (input)="errors.prenom = ''" />
        </div>
        <div class="auth-error" *ngIf="errors.prenom">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errors.prenom }}
        </div>
      </div>
    </div>

    <!-- EMAIL -->
    <div class="auth-field">
      <label class="auth-label">Adresse email</label>
      <div class="auth-input-wrapper" [class.has-error]="errors.email">
        <input type="email" [(ngModel)]="regData.email"
               placeholder="exemple@entreprise.com" class="auth-input"
               (input)="errors.email = ''" />
      </div>
      <div class="auth-error" *ngIf="errors.email">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.email }}
      </div>
    </div>

    <!-- TELEPHONE -->
    <div class="auth-field">
      <label class="auth-label">
        Téléphone <span class="auth-optional">(optionnel)</span>
      </label>
      <div class="auth-input-wrapper">
        <input type="tel" [(ngModel)]="regData.telephone"
               placeholder="+216 XX XXX XXX" class="auth-input" />
      </div>
    </div>

    <!-- DATE NAISSANCE -->
    <div class="auth-field">
      <label class="auth-label">Date de naissance</label>
      <div class="auth-input-wrapper">
        <input type="date" [(ngModel)]="regData.dateNaissance"
               class="auth-input auth-input-date" />
      </div>
    </div>

    <!-- MOT DE PASSE -->
    <div class="auth-field">
      <label class="auth-label">Mot de passe</label>
      <div class="auth-input-wrapper" [class.has-error]="errors.password">
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="regData.password"
               placeholder="••••••••" class="auth-input"
               (input)="errors.password = ''" />
        <button class="auth-eye-btn" type="button" (click)="showPassword = !showPassword">
          <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="auth-error" *ngIf="errors.password">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.password }}
      </div>
    </div>

    <!-- BOUTON -->
    <button class="auth-btn" (click)="onRegister()" [disabled]="isLoading">
      <span class="auth-btn-spinner" *ngIf="isLoading"></span>
      <ng-container *ngIf="!isLoading">
        Créer mon compte →
      </ng-container>
    </button>

    <p class="auth-footer">
      Déjà un compte ?
      <span class="auth-link" (click)="goToLogin()">Se connecter</span>
    </p>

  </div>

  <p class="auth-copyright">2026 ASM. Tous droits réservés.</p>

</div>
