<div class="sidebar" [class.collapsed]="isCollapsed">

  <nav class="sidebar-nav">

    <a class="nav-item" [class.active]="isActive('/admin/dashboard')"
       routerLink="/admin/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span *ngIf="!isCollapsed">Tableau de bord</span>
    </a>

    <a class="nav-item" [class.active]="isActive('/admin/utilisateurs')"
       routerLink="/admin/utilisateurs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-4-4h-1"/>
        <circle cx="19" cy="7" r="2"/>
      </svg>
      <span *ngIf="!isCollapsed">Utilisateurs</span>
    </a>

    <a class="nav-item" [class.active]="isActive('/admin/parametres')"
       routerLink="/admin/parametres">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span *ngIf="!isCollapsed">Paramètres</span>
    </a>

    <a class="nav-item" [class.active]="isActive('/admin/demandes-acces')"
       routerLink="/admin/demandes-acces">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <polyline points="9 15 11 17 15 13"/>
      </svg>
      <span *ngIf="!isCollapsed">Demandes d'accès</span>
    </a>

    <a class="nav-item" [class.active]="isActive('/admin/profil')"
       routerLink="/admin/profil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span *ngIf="!isCollapsed">Profil</span>
    </a>

  </nav>

  <button class="collapse-btn" (click)="toggle()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         [style.transform]="isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)'">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span *ngIf="!isCollapsed">Déconnexion</span>
    </button>
  </div>

</div>
