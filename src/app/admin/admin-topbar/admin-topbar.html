<div class="atb">

  <!-- LOGO -->
  <div class="atb-logo">
    <img src="assets/logo-asm.png" alt="ASM" class="atb-logo-img" />
  </div>

  <!-- RIGHT -->
  <div class="atb-right">

    <!-- CLOCHE -->
    <button class="atb-icon-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>

    <!-- PROFIL -->
    <div class="atb-profile" (click)="toggleDropdown()">
      <div class="atb-avatar">{{ initiales }}</div>
      <div class="atb-info">
        <span class="atb-name">{{ nomComplet }}</span>
        <span class="atb-email">{{ email }}</span>
      </div>
      <svg class="atb-chevron" [class.open]="showDropdown"
           width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <!-- DROPDOWN -->
    <div class="atb-dropdown" *ngIf="showDropdown">
      <button class="atb-dd-item" (click)="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Déconnexion
      </button>
    </div>

  </div>
</div>

<!-- CLICK OUTSIDE -->
<div class="atb-backdrop" *ngIf="showDropdown" (click)="showDropdown = false"></div>
