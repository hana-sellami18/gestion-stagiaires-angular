<div class="ap-page">
  <div class="ap-wrap">

    <!-- Alert -->
    <div class="ap-alert success" *ngIf="successMessage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMessage }}
    </div>
    <div class="ap-alert error" *ngIf="errorMessage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Header -->
    <div class="ap-header">
      <div class="ap-avatar">{{ getInitiales() }}</div>
      <div class="ap-header-info">
        <h1 class="ap-name">{{ profile.prenom }} {{ profile.nom }}</h1>
        <span class="ap-role">Administrateur</span>
        <span class="ap-email">{{ profile.email }}</span>
      </div>
    </div>

    <!-- Infos personnelles -->
    <div class="ap-card">
      <div class="ap-card-title">Informations personnelles</div>

      <div class="ap-form-row">
        <div class="ap-form-group">
          <label>Prénom</label>
          <input type="text" [(ngModel)]="editProfile.prenom" placeholder="Prénom"/>
        </div>
        <div class="ap-form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="editProfile.nom" placeholder="Nom"/>
        </div>
      </div>

      <div class="ap-form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="editProfile.email" placeholder="Email"/>
      </div>

      <div class="ap-form-group">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="editProfile.telephone" placeholder="Téléphone"/>
      </div>

      <div class="ap-form-group">
        <label>Rôle</label>
        <input type="text" value="Administrateur" disabled class="ap-disabled"/>
      </div>

      <div class="ap-card-footer">
        <button class="ap-btn-primary" (click)="saveProfile()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Enregistrer
        </button>
      </div>
    </div>

    <!-- Mot de passe -->
    <div class="ap-card">
      <div class="ap-card-title">Changer le mot de passe</div>

      <div class="ap-form-group">
        <label>Nouveau mot de passe</label>
        <div class="ap-input-wrap">
          <input [type]="showNouveau ? 'text' : 'password'"
                 [(ngModel)]="passwordForm.nouveau"
                 placeholder="••••••••"/>
          <button class="ap-eye" (click)="showNouveau = !showNouveau">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path *ngIf="!showNouveau" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle *ngIf="!showNouveau" cx="12" cy="12" r="3"/>
              <path *ngIf="showNouveau" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line *ngIf="showNouveau" x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="ap-form-group">
        <label>Confirmer le mot de passe</label>
        <div class="ap-input-wrap">
          <input [type]="showConfirmer ? 'text' : 'password'"
                 [(ngModel)]="passwordForm.confirmer"
                 placeholder="••••••••"/>
          <button class="ap-eye" (click)="showConfirmer = !showConfirmer">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path *ngIf="!showConfirmer" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle *ngIf="!showConfirmer" cx="12" cy="12" r="3"/>
              <path *ngIf="showConfirmer" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line *ngIf="showConfirmer" x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="ap-card-footer">
        <button class="ap-btn-primary" (click)="savePassword()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Modifier le mot de passe
        </button>
      </div>
    </div>

  </div>
</div>
