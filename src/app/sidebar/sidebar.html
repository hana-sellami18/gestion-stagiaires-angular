<div class="sidebar" [class.collapsed]="isCollapsed">

  <!-- LOGO -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <img src="assets/logo-asm.png" alt="ASM" *ngIf="!isCollapsed"
           style="height:32px;width:auto;object-fit:contain;" />
      <span *ngIf="isCollapsed">RH</span>
    </div>
    <div class="logo-text" *ngIf="!isCollapsed">
      <span class="logo-title">ASM</span>
      <span class="logo-sub">All Soft Multimedia</span>
    </div>
  </div>

  <!-- NAV -->
  <nav class="sidebar-nav">
    <p class="sidebar-section-label" *ngIf="!isCollapsed">Menu principal</p>

    <button class="sidebar-item" [class.active]="activeView === 'dashboard'"
            (click)="goDashboard.emit()" [title]="isCollapsed ? 'Tableau de bord' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Tableau de bord</span>
    </button>

    <button class="sidebar-item" [class.active]="activeView === 'list'"
            (click)="goList.emit()" [title]="isCollapsed ? 'Sujets de stage' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Sujets de stage</span>
      <span class="sidebar-count" *ngIf="!isCollapsed && totalOffres > 0">{{ totalOffres }}</span>
    </button>

    <button class="sidebar-item" [class.active]="activeView === 'candidatures'"
            (click)="goCandidatures.emit()" [title]="isCollapsed ? 'Candidatures' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Candidatures</span>
    </button>

    <button class="sidebar-item" [class.active]="activeView === 'stagiaires'"
            (click)="goStagiaires.emit()" [title]="isCollapsed ? 'Stagiaires' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Stagiaires</span>
    </button>

    <button class="sidebar-item" [class.active]="activeView === 'encadrants'"
            (click)="goEncadrants.emit()" [title]="isCollapsed ? 'Encadrants' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Encadrants</span>
    </button>

    <button class="sidebar-item" [class.active]="activeView === 'evaluations'"
            (click)="goEvaluations.emit()" [title]="isCollapsed ? 'Évaluations' : ''">
      <div class="sidebar-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span *ngIf="!isCollapsed">Évaluations</span>
    </button>

  </nav>  <!-- ✅ fermeture nav -->

  <!-- ✅ FOOTER — toujours en bas -->
  <div class="sidebar-footer">

    <!-- Bouton collapse -->
    <button class="collapse-btn" (click)="toggleCollapse()"
            [title]="isCollapsed ? 'Agrandir' : 'Réduire'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round"
           [style.transform]="isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)'">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <!-- ❌ Supprime cette ligne -->
      <!-- <span *ngIf="!isCollapsed">Réduire</span> -->
    </button>

    <!-- Déconnexion -->
    <button class="sidebar-logout" (click)="logout.emit()"
            [title]="isCollapsed ? 'Déconnexion' : ''">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span *ngIf="!isCollapsed">Déconnexion</span>
    </button>

  </div>

</div>
